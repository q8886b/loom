name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      LOOM_EMBED_PROVIDER: ollama
      LOOM_EMBED_MODEL: bge-m3
      LOOM_EMBED_DIM: "1024"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Runtime diagnostics
        run: |
          python -VV
          python - <<'PY'
          import sqlite3
          import sqlite_vec
          print("sqlite", sqlite3.sqlite_version)
          print("sqlite_vec", getattr(sqlite_vec, "__version__", "unknown"))
          PY
      - name: Run tests
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee pytest.log
      - name: Publish pytest log
        if: always()
        run: |
          {
            echo "## pytest log"
            echo '```text'
            tail -200 pytest.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workbench/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: workbench/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev
      - name: Build
        run: npm run build
